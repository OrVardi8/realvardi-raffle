<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealVardi · מירוץ ההגרלות</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --p1:#964bcc; --p2:#4b0d87; --p3:#b567ff; --dark:#280d42; --ink:#171717; --white:#ffffff;
    --bg1:#1a0833;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    font-family:"Heebo","Segoe UI",Arial,sans-serif; color:var(--white);
    background:radial-gradient(1200px 600px at 50% -10%, #3a1466 0%, var(--bg1) 55%, #0e0420 100%);
    min-height:100vh; padding:24px 16px 60px; overflow-x:hidden;
  }
  .wrap{max-width:1100px; margin:0 auto}
  header{display:flex; align-items:center; gap:16px; justify-content:center; margin-bottom:8px}
  header img{width:64px; height:64px; filter:drop-shadow(0 4px 14px rgba(181,103,255,.5))}
  h1,.card h2,.btn,.winner-big,#raceTitle,.count-pill,.slider-val{font-family:"Rubik","Heebo",sans-serif}
  header h1{font-size:30px; font-weight:900; letter-spacing:.5px;
    background:linear-gradient(90deg,#b567ff,#fff,#964bcc); -webkit-background-clip:text; background-clip:text; color:transparent}
  .sub{text-align:center; color:#cdb6e6; margin-bottom:26px; font-size:15px}

  .card{
    background:linear-gradient(180deg, rgba(75,13,135,.45), rgba(40,13,66,.6));
    border:1px solid rgba(181,103,255,.28); border-radius:18px; padding:22px;
    box-shadow:0 10px 40px rgba(0,0,0,.35); margin-bottom:22px; backdrop-filter:blur(4px);
  }
  .card h2{font-size:18px; margin-bottom:14px; color:#e6d4ff; display:flex; align-items:center; gap:8px}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:18px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}

  label{display:block; font-size:13px; color:#cdb6e6; margin-bottom:6px}
  textarea,input[type=number]{
    width:100%; background:rgba(14,4,32,.6); border:1px solid rgba(181,103,255,.3);
    color:#fff; border-radius:12px; padding:11px 13px; font-size:15px; font-family:inherit; resize:vertical;
  }
  textarea{min-height:120px; line-height:1.7}
  textarea:focus,input:focus{outline:none; border-color:var(--p3); box-shadow:0 0 0 3px rgba(181,103,255,.25)}

  .btn{border:none; cursor:pointer; font-family:inherit; font-weight:700; font-size:15px;
    border-radius:12px; padding:12px 18px; transition:transform .12s, box-shadow .2s, opacity .2s; color:#fff}
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  .btn-primary{background:linear-gradient(135deg,var(--p3),var(--p2)); box-shadow:0 8px 24px rgba(150,75,204,.45)}
  .btn-ghost{background:rgba(181,103,255,.14); border:1px solid rgba(181,103,255,.35)}
  .btn-lg{font-size:20px; padding:16px 28px; width:100%}
  .btn:disabled{opacity:.45; cursor:not-allowed; transform:none}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}

  .filebox{border:2px dashed rgba(181,103,255,.45); border-radius:14px; padding:24px; text-align:center;
    cursor:pointer; transition:.2s; background:rgba(14,4,32,.35)}
  .filebox:hover,.filebox.drag{background:rgba(181,103,255,.12); border-color:var(--p3)}
  .filebox .big{font-size:30px; margin-bottom:6px}
  .filebox small{color:#a98fd0}

  .count-pill{background:var(--p2); border:1px solid rgba(181,103,255,.5); border-radius:999px;
    padding:4px 12px; font-size:13px; font-weight:700}
  .chips{display:flex; flex-wrap:wrap; gap:8px; max-height:180px; overflow:auto; margin-top:14px}
  .chip{background:rgba(150,75,204,.25); border:1px solid rgba(181,103,255,.4); border-radius:999px;
    padding:5px 10px 5px 12px; font-size:14px; display:flex; align-items:center; gap:7px}
  .chip button{background:none; border:none; color:#e6b8ff; cursor:pointer; font-size:16px; line-height:1; padding:0}
  .chip button:hover{color:#fff}

  /* settings */
  .settings-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px}
  @media(max-width:760px){.settings-grid{grid-template-columns:1fr}}
  .field{background:rgba(14,4,32,.3); border:1px solid rgba(181,103,255,.2); border-radius:14px; padding:14px}
  .slider{width:100%; accent-color:var(--p3)}
  .slider-val{font-weight:800; color:#fff; font-size:16px}
  .switch{display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none}
  .switch input{width:42px; height:24px; appearance:none; background:rgba(120,90,160,.4);
    border-radius:999px; position:relative; cursor:pointer; transition:.2s; flex:none}
  .switch input:checked{background:var(--p1)}
  .switch input::after{content:""; position:absolute; width:18px; height:18px; border-radius:50%;
    background:#fff; top:3px; right:3px; transition:.2s}
  .switch input:checked::after{right:21px}

  /* character picker */
  .char-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(58px,1fr)); gap:10px; margin-top:6px}
  .char-opt{aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:30px;
    background:rgba(14,4,32,.4); border:2px solid rgba(181,103,255,.25); border-radius:14px; cursor:pointer; transition:.15s}
  .char-opt:hover{transform:translateY(-3px); border-color:var(--p3)}
  .char-opt.sel{border-color:#ffd86b; background:rgba(181,103,255,.3); box-shadow:0 0 14px rgba(255,216,107,.4)}
  .char-opt small{display:none}

  /* RACE */
  #raceCard{display:none; width:100vw; max-width:100vw; margin-left:calc(50% - 50vw);
    border-radius:0; padding:18px clamp(16px,4vw,70px)}
  .track-scroll{border-radius:14px}
  .track{position:relative; direction:ltr; border:1px solid rgba(181,103,255,.35);
    border-radius:14px; overflow:hidden; box-shadow:inset 0 0 60px rgba(0,0,0,.35)}
  .scene{position:absolute; inset:0; width:100%; height:100%; z-index:0}
  .startline{position:absolute; top:0; bottom:0; left:8px; width:6px; z-index:3;
    background:repeating-linear-gradient(180deg,#fff 0 8px,#b567ff 8px 16px); opacity:.65; border-radius:3px}
  .finish{position:absolute; top:0; bottom:0; right:10px; width:16px; z-index:3;
    background:repeating-linear-gradient(45deg,#fff 0 8px,#171717 8px 16px); opacity:.92;
    border-radius:3px; box-shadow:0 0 16px rgba(255,255,255,.5)}
  .flag{position:absolute; right:6px; top:-2px; font-size:24px; z-index:4}
  .lane{position:relative; display:flex; align-items:center; z-index:1;
    border-bottom:1px solid rgba(255,255,255,.07)}
  .lane:last-child{border-bottom:none}
  .lane.won{background:linear-gradient(90deg,transparent,rgba(255,216,107,.28),rgba(181,103,255,.4))}
  .runner{position:absolute; left:6px; bottom:1px; z-index:2; text-align:center; will-change:transform}
  .runner .char{line-height:1; transform:scaleX(-1); display:inline-block;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.75))}
  .runner .rname{color:#fff; text-shadow:0 1px 4px #000, 0 0 6px #000; margin-top:-2px;
    direction:rtl; unicode-bidi:isolate; max-width:110px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

  .go-overlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(14,4,32,.55); backdrop-filter:blur(2px); z-index:10}
  .go-overlay .btn{width:auto; min-width:240px}
  .countdown{position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    z-index:11; pointer-events:none}
  .countdown span{font-size:120px; font-weight:900;
    background:linear-gradient(90deg,#ffd86b,#fff,#b567ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(181,103,255,.7); animation:pop .8s ease}
  @keyframes pop{0%{transform:scale(.3); opacity:0}40%{transform:scale(1.15); opacity:1}100%{transform:scale(1); opacity:.9}}

  /* RESULTS */
  #results{display:none; text-align:center}
  .winner-big{font-size:34px; font-weight:800; margin:6px 0 4px;
    background:linear-gradient(90deg,#ffd86b,#fff,#b567ff); -webkit-background-clip:text; background-clip:text; color:transparent}
  .podium{display:flex; flex-direction:column; gap:10px; max-width:480px; margin:18px auto 0}
  .place{display:flex; align-items:center; gap:14px; background:rgba(150,75,204,.18);
    border:1px solid rgba(181,103,255,.35); border-radius:12px; padding:12px 16px; font-size:17px}
  .place .medal{font-size:24px}
  .place .pname{font-weight:700; flex:1; text-align:right}
  .place .pchar{font-size:26px}
  .place.p1{background:linear-gradient(90deg,rgba(255,216,107,.22),rgba(150,75,204,.18)); border-color:rgba(255,216,107,.5)}

  .hint{font-size:12px; color:#a98fd0; margin-top:8px}
  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--p2); border:1px solid var(--p3); padding:11px 18px; border-radius:12px;
    font-size:14px; opacity:0; transition:.3s; z-index:50; pointer-events:none}
  .toast.show{opacity:1}
  canvas#confetti{position:fixed; inset:0; pointer-events:none; z-index:40}

  /* accessibility & polish */
  :focus-visible{outline:3px solid #ffd86b; outline-offset:3px; border-radius:8px}
  .char-opt:focus-visible{outline-offset:2px}
  .chip button{min-width:26px; min-height:26px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%}
  .chip button:hover{background:rgba(255,255,255,.12)}
  .char-opt{outline:none}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important}
    .btn:hover,.char-opt:hover{transform:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="logo.png" alt="RealVardi">
    <h1>מירוץ ההגרלות</h1>
  </header>
  <p class="sub">טען משתתפים, בחר דמות ומסלול — והראשון לקו הסיום מנצח 🏁</p>

  <!-- SETUP -->
  <div id="setupCard">
    <div class="grid">
      <div class="card">
        <h2>📥 טעינת קובץ CSV</h2>
        <div class="filebox" id="filebox">
          <div class="big">📄</div>
          <div>גרור לכאן קובץ CSV או לחץ לבחירה</div>
          <small>שם בכל שורה, או מופרדים בפסיקים</small>
        </div>
        <input type="file" id="fileInput" accept=".csv,.txt" hidden>
      </div>
      <div class="card">
        <h2>✍️ הזנה ידנית</h2>
        <label>הקלד שמות — שם בכל שורה</label>
        <textarea id="manualInput" placeholder="דנה כהן&#10;יוסי לוי&#10;מאיה..."></textarea>
        <div class="row" style="margin-top:10px">
          <button class="btn btn-ghost" id="addManual">➕ הוסף לרשימה</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>👥 משתתפים <span class="count-pill" id="countPill">0</span></h2>
      <div class="chips" id="chips"></div>
      <p class="hint" id="emptyHint">עדיין אין משתתפים — טען קובץ או הקלד שמות.</p>
      <div class="row" style="justify-content:flex-end; margin-top:10px">
        <button class="btn btn-ghost" id="clearAll">🗑️ נקה הכל</button>
      </div>
    </div>

    <!-- race settings -->
    <div class="card">
      <h2>⚙️ הגדרות המירוץ</h2>
      <div class="settings-grid">
        <div class="field">
          <label>משך המירוץ: <span class="slider-val" id="durVal">8</span> שניות</label>
          <input type="range" class="slider" id="durSlider" min="3" max="25" value="8">
        </div>
        <div class="field">
          <label>מספר זוכים</label>
          <input type="number" id="winnersCount" value="1" min="1" step="1">
        </div>
      </div>
      <div class="field" style="margin-top:14px">
        <label class="switch">
          <input type="checkbox" id="soundToggle" checked>
          <span>🔊 צלילים — ספירה לאחור, זינוק וניצחון</span>
        </label>
      </div>
      <div class="field" style="margin-top:14px">
        <label>בחר דמות לכל המתחרים</label>
        <div class="char-grid" id="charGrid"></div>
      </div>
    </div>

    <button class="btn btn-primary btn-lg" id="startBtn" disabled>🏁 התחל מירוץ</button>
  </div>

  <!-- RACE -->
  <div class="card" id="raceCard">
    <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:14px">
      <h2 id="raceTitle" style="margin:0">🚦 המתחרים בעמדות...</h2>
      <button class="btn btn-ghost" id="muteBtn" style="padding:8px 13px" title="צלילים">🔊</button>
    </div>
    <div class="track-scroll">
      <div class="track" id="track">
        <svg class="scene" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#2a0d4d"/><stop offset=".4" stop-color="#7a2a8f"/>
              <stop offset=".68" stop-color="#d4568a"/><stop offset=".84" stop-color="#ff9e6b"/>
              <stop offset="1" stop-color="#ffd6a0"/>
            </linearGradient>
            <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#3a1a55"/><stop offset="1" stop-color="#1c0c30"/>
            </linearGradient>
            <radialGradient id="sun" cx="50%" cy="50%" r="50%">
              <stop offset="0" stop-color="#fff3c4"/><stop offset=".6" stop-color="#ffd27a"/>
              <stop offset="1" stop-color="#ff9e5e" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <rect width="1000" height="600" fill="url(#sky)"/>
          <circle cx="500" cy="350" r="130" fill="url(#sun)"/>
          <circle cx="500" cy="350" r="62" fill="#fff1c0" opacity=".95"/>
          <!-- distant hills -->
          <path d="M0,360 Q200,290 430,345 T1000,330 L1000,470 L0,470 Z" fill="#6a2f7e" opacity=".85"/>
          <path d="M0,400 Q260,330 560,395 T1000,380 L1000,470 L0,470 Z" fill="#4a1f63"/>
          <!-- HOLLYWOOD sign on the left hill -->
          <g transform="translate(150,300) rotate(-4)" fill="#ffffff" opacity=".95"
             font-family="Arial, sans-serif" font-weight="900" font-size="30" letter-spacing="2">
            <text x="0" y="0">HOLLYWOOD</text>
          </g>
          <!-- foreground ground -->
          <rect x="0" y="455" width="1000" height="145" fill="url(#ground)"/>
          <!-- palm trees -->
          <g fill="#160826">
            <!-- left palm -->
            <g transform="translate(95,470) scale(1.15)">
              <path d="M-4,0 Q-12,-70 6,-135 Q14,-70 6,0 Z"/>
              <g transform="translate(5,-135)">
                <path d="M0,0 Q-45,-12 -78,-34 Q-40,-4 0,0 Z"/>
                <path d="M0,0 Q-30,-32 -40,-74 Q-8,-34 0,0 Z"/>
                <path d="M0,0 Q-6,-44 8,-82 Q14,-40 0,0 Z"/>
                <path d="M0,0 Q34,-30 44,-72 Q12,-32 0,0 Z"/>
                <path d="M0,0 Q48,-12 80,-34 Q42,-4 0,0 Z"/>
              </g>
            </g>
            <!-- right palm -->
            <g transform="translate(915,470) scale(1.3)">
              <path d="M-4,0 Q-14,-78 6,-150 Q16,-78 6,0 Z"/>
              <g transform="translate(5,-150)">
                <path d="M0,0 Q-50,-14 -86,-38 Q-44,-4 0,0 Z"/>
                <path d="M0,0 Q-32,-36 -44,-82 Q-8,-38 0,0 Z"/>
                <path d="M0,0 Q-6,-50 8,-92 Q16,-44 0,0 Z"/>
                <path d="M0,0 Q38,-34 50,-80 Q12,-36 0,0 Z"/>
                <path d="M0,0 Q52,-14 88,-38 Q46,-4 0,0 Z"/>
              </g>
            </g>
            <!-- small mid palm -->
            <g transform="translate(770,468) scale(.8)">
              <path d="M-3,0 Q-10,-60 5,-115 Q12,-60 5,0 Z"/>
              <g transform="translate(4,-115)">
                <path d="M0,0 Q-40,-10 -68,-30 Q-34,-3 0,0 Z"/>
                <path d="M0,0 Q-24,-28 -34,-64 Q-6,-30 0,0 Z"/>
                <path d="M0,0 Q-4,-40 8,-72 Q12,-34 0,0 Z"/>
                <path d="M0,0 Q30,-26 40,-62 Q10,-28 0,0 Z"/>
                <path d="M0,0 Q42,-10 70,-30 Q36,-3 0,0 Z"/>
              </g>
            </g>
          </g>
          <!-- ground sheen toward finish -->
          <rect x="0" y="455" width="1000" height="145" fill="#000000" opacity=".18"/>
        </svg>
        <div class="startline"></div>
        <div class="finish"></div>
        <div class="flag">🏁</div>
        <div class="go-overlay" id="goOverlay">
          <button class="btn btn-primary btn-lg" id="goBtn">🚦 צאו לדרך!</button>
        </div>
        <div class="countdown" id="countdown"><span id="cdNum"></span></div>
      </div>
    </div>
    <div class="row" style="justify-content:flex-end; margin-top:12px">
      <button class="btn btn-ghost" id="cancelRace">⬅️ חזרה</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="card" id="results">
    <div style="font-size:46px">🏆</div>
    <div class="winner-big" id="winnerBig"></div>
    <div class="podium" id="podium"></div>
    <div class="row" style="justify-content:center; margin-top:22px">
      <button class="btn btn-primary" id="againBtn">🔁 הגרלה חוזרת (אותם משתתפים)</button>
      <button class="btn btn-ghost" id="newBtn">⬅️ רשימה חדשה</button>
    </div>
  </div>
</div>

<canvas id="confetti"></canvas>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
let participants = [];

/* ---------- sounds (Web Audio, no files) ---------- */
let actx=null;
function audio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume(); }catch(e){} return actx; }
function soundOn(){ const t=$('#soundToggle'); return !t || t.checked; }
function tone(freq,start,dur,type='sine',vol=0.2){
  if(!soundOn()) return; const a=audio(); if(!a) return;
  const t=a.currentTime+start, o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.03);
}
function sndBeep(){ tone(640,0,0.18,'square',0.16); }
function sndGo(){ tone(880,0,0.45,'sawtooth',0.18); tone(1320,0.04,0.4,'square',0.1); }
function sndCross(){ tone(1046,0,0.16,'triangle',0.22); tone(1568,0.08,0.18,'triangle',0.15); }
function sndFanfare(){ [523,659,784,1046].forEach((f,i)=>tone(f,i*0.13,0.32,'square',0.18));
  tone(1318,0.52,0.7,'sawtooth',0.16); }

/* ---------- characters ---------- */
const CHARACTERS = ['🦄','🐎','🐇','🐢','🐆','🦊','🐅','🐉','🦖','🐸','🐶','🐱','🦅','🐌','🐝','🦔','🦘','🐧','🦩','🚀','🏎️','🛼'];
let selectedChar = '🦄'; // or 'mix'
function buildCharGrid(){
  const g=$('#charGrid'); g.innerHTML='';
  const opts=['mix',...CHARACTERS];
  opts.forEach(c=>{
    const d=document.createElement('div');
    d.className='char-opt'+(c===selectedChar?' sel':'');
    d.textContent = c==='mix' ? '🎲' : c;
    d.tabIndex=0; d.setAttribute('role','radio'); d.setAttribute('aria-checked', c===selectedChar?'true':'false');
    d.setAttribute('aria-label', c==='mix' ? 'ערבב — דמות אקראית לכל מתחרה' : ('דמות '+c));
    d.title = c==='mix' ? 'ערבב — דמות אקראית לכל מתחרה' : '';
    const choose=()=>{ selectedChar=c; buildCharGrid(); };
    d.onclick=choose;
    d.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); choose(); } };
    g.appendChild(d);
  });
}

/* ---------- participants ---------- */
function normalize(raw){ return raw.split(/[\r\n,;\t]+/).map(s=>s.trim()).filter(Boolean); }
function addNames(names){
  const existing=new Set(participants.map(p=>p.toLowerCase())); let added=0;
  for(const n of names){ if(n && !existing.has(n.toLowerCase())){ participants.push(n); existing.add(n.toLowerCase()); added++; } }
  render(); return added;
}
function render(){
  $('#countPill').textContent=participants.length;
  const chips=$('#chips'); chips.innerHTML='';
  participants.forEach((p,i)=>{
    const c=document.createElement('div'); c.className='chip';
    c.innerHTML=`<span></span><button title="הסר">✕</button>`;
    c.querySelector('span').textContent=p;
    c.querySelector('button').onclick=()=>{ participants.splice(i,1); render(); };
    chips.appendChild(c);
  });
  $('#emptyHint').style.display=participants.length?'none':'block';
  $('#startBtn').disabled=participants.length<2;
  $('#winnersCount').max=Math.max(1,participants.length);
}
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

const filebox=$('#filebox'), fileInput=$('#fileInput');
filebox.onclick=()=>fileInput.click();
fileInput.onchange=e=>{ if(e.target.files[0]) readFile(e.target.files[0]); fileInput.value=''; };
['dragover','dragenter'].forEach(ev=>filebox.addEventListener(ev,e=>{e.preventDefault();filebox.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>filebox.addEventListener(ev,e=>{e.preventDefault();filebox.classList.remove('drag');}));
filebox.addEventListener('drop',e=>{ const f=e.dataTransfer.files[0]; if(f) readFile(f); });
function readFile(file){ const r=new FileReader();
  r.onload=()=>{ const n=addNames(normalize(r.result)); toast(n?`נוספו ${n} משתתפים מהקובץ`:'לא נמצאו שמות חדשים'); };
  r.readAsText(file,'UTF-8'); }
$('#addManual').onclick=()=>{ const n=addNames(normalize($('#manualInput').value));
  if(n){ $('#manualInput').value=''; toast(`נוספו ${n} משתתפים`); } else toast('לא נמצאו שמות חדשים'); };
$('#clearAll').onclick=()=>{ if(participants.length && confirm('לנקות את כל הרשימה?')){ participants=[]; render(); } };

$('#durSlider').oninput=e=>$('#durVal').textContent=e.target.value;

/* ---------- fair shuffle ---------- */
function rand(n){ if(window.crypto&&crypto.getRandomValues){ const u=new Uint32Array(1); crypto.getRandomValues(u); return u[0]/4294967296*n; } return Math.random()*n; }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rand(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickChar(){ return CHARACTERS[Math.floor(rand(CHARACTERS.length))]; }

/* ---------- the race ---------- */
const COLORS=['#b567ff','#964bcc','#ffd86b','#ff8fd1','#6bd5ff','#7CFFB2','#ff9d6b','#c0a6ff'];
let rafId=null, raceState=null;

function syncMute(){ const b=$('#muteBtn'); if(b) b.textContent=soundOn()?'🔊':'🔇'; }

function buildRace(){
  let k=parseInt($('#winnersCount').value)||1;
  k=Math.max(1,Math.min(k,participants.length)); $('#winnersCount').value=k;
  const durSec=parseInt($('#durSlider').value)||8;

  const order=shuffle(participants.map((name,i)=>({name,i})));
  const rankOf=new Map(); order.forEach((o,r)=>rankOf.set(o.i,r));
  const N=participants.length, baseTime=durSec*1000;

  $('#setupCard').style.display='none';
  $('#results').style.display='none';
  $('#raceCard').style.display='block';
  $('#raceTitle').textContent='🚦 המתחרים בעמדות...';
  $('#goOverlay').style.display='flex';
  $('#countdown').style.display='none';
  syncMute();

  const track=$('#track');
  track.querySelectorAll('.lane').forEach(l=>l.remove());

  // compact: squeeze all lanes into ~55% of the screen height — no scrolling
  const maxTrackPx=Math.max(200, Math.min(window.innerHeight*0.55, 540));
  const laneH=Math.max(20, Math.min(64, Math.floor(maxTrackPx/N)));
  const charPx=Math.round(Math.max(15, Math.min(40, laneH*0.62)));
  const namePx=laneH<30?10:12;
  const showName=laneH>=18;

  const lanes=[];
  participants.forEach((name,i)=>{
    const lane=document.createElement('div'); lane.className='lane'; lane.style.height=laneH+'px';
    const ch = selectedChar==='mix' ? pickChar() : selectedChar;
    const run=document.createElement('div'); run.className='runner';
    run.innerHTML=`<div class="char"></div><div class="rname"></div>`;
    const cEl=run.querySelector('.char'); cEl.textContent=ch; cEl.style.fontSize=charPx+'px';
    cEl.style.filter=`drop-shadow(0 0 6px ${COLORS[i%COLORS.length]})`;
    const nEl=run.querySelector('.rname'); nEl.textContent=name; nEl.style.fontSize=namePx+'px';
    nEl.style.display=showName?'block':'none';
    lane.appendChild(run); track.appendChild(lane);
    const rank=rankOf.get(i);
    lanes.push({i,name,ch,run,lane,
      dur: baseTime*(1 + rank*(0.45/Math.max(1,N))) + rand(220),
      wob:0.5+rand(0.9), phase:rand(6.28), done:false});
  });
  raceState={order,k,lanes,started:false,firstCrossAt:null};
}

function go(){
  if(!raceState||raceState.started) return;
  raceState.started=true;
  $('#goOverlay').style.display='none';
  const cd=$('#countdown'), num=$('#cdNum');
  cd.style.display='flex';
  audio(); // unlock audio on this user gesture
  const seq=['3','2','1','צאו!']; let idx=0;
  function step(){
    num.textContent=seq[idx];
    num.style.animation='none'; void num.offsetWidth; num.style.animation='pop .8s ease';
    if(idx<3) sndBeep(); else sndGo();
    idx++;
    if(idx<seq.length){ setTimeout(step,800); }
    else { setTimeout(()=>{ cd.style.display='none'; runAnimation(); },650); }
  }
  step();
}

function runAnimation(){
  $('#raceTitle').textContent='🏁 המירוץ בעיצומו...';
  const {lanes,order,k}=raceState;
  const track=$('#track');
  const distance=track.clientWidth-90;   // left(start) -> right(finish)
  raceState.distance=distance;
  const t0=performance.now();

  function frame(now){
    const el=now-t0;
    for(const L of lanes){
      let prog=el/L.dur; if(prog>1) prog=1;
      const wob = prog<0.96 ? Math.sin(el/170*L.wob+L.phase)*0.045*(1-prog) : 0;
      const shown=Math.max(0,Math.min(1,prog+wob));
      const x=shown*distance;            // move right (LTR)
      const bob = prog<1 ? Math.abs(Math.sin(el/85+L.phase))*4 : 0;
      L.run.style.transform=`translate(${x}px, ${-bob}px)`;
      if(prog>=1 && !L.done){
        L.done=true;
        if(raceState.firstCrossAt===null){     // the winner just crossed
          raceState.firstCrossAt=now; sndCross();
          $('#raceTitle').textContent='🏁 יש מנצח!';
        }
      }
    }
    // one second after the first runner finishes → bring everyone to the line
    if(raceState.firstCrossAt!==null && now-raceState.firstCrossAt>=1000){
      bringAllToFinish(); return;
    }
    rafId=requestAnimationFrame(frame);
  }
  rafId=requestAnimationFrame(frame);
}

function bringAllToFinish(){
  const {lanes,order,k,distance}=raceState;
  lanes.forEach(L=>{
    L.run.style.transition='transform .6s cubic-bezier(.22,1,.36,1)';
    L.run.style.transform=`translate(${distance}px, 0)`;
  });
  setTimeout(()=>finishRace(order,k,lanes), 750);
}

function finishRace(order,k,lanes){
  const winners=order.slice(0,k);
  const winSet=new Set(winners.map(o=>o.i));
  lanes.forEach(L=>{ if(winSet.has(L.i)) L.lane.classList.add('won'); });
  const charOf=new Map(lanes.map(L=>[L.i,L.ch]));
  $('#raceCard').style.display='none';
  $('#results').style.display='block';
  $('#winnerBig').textContent = k===1 ? `🎉 ${winners[0].name} 🎉` : `🎉 ${k} הזוכים 🎉`;
  const podium=$('#podium'); podium.innerHTML='';
  const medals=['🥇','🥈','🥉'];
  winners.forEach((w,idx)=>{
    const d=document.createElement('div'); d.className='place'+(idx===0?' p1':'');
    d.innerHTML=`<span class="medal">${medals[idx]||'🏅'}</span><span class="pname"></span><span class="pchar"></span>`;
    d.querySelector('.pname').textContent=`${idx+1}. ${w.name}`;
    d.querySelector('.pchar').textContent=charOf.get(w.i)||'🦄';
    podium.appendChild(d);
  });
  sndFanfare(); burst();
}

$('#startBtn').onclick=buildRace;
$('#goBtn').onclick=go;
$('#muteBtn').onclick=()=>{ const t=$('#soundToggle'); t.checked=!t.checked; syncMute(); };
$('#soundToggle').addEventListener('change',syncMute);
$('#cancelRace').onclick=()=>{ cancelAnimationFrame(rafId); raceState=null;
  $('#raceCard').style.display='none'; $('#setupCard').style.display='block'; };
$('#againBtn').onclick=()=>{ cancelAnimationFrame(rafId); buildRace(); };
$('#newBtn').onclick=()=>{ cancelAnimationFrame(rafId); raceState=null;
  $('#results').style.display='none'; $('#raceCard').style.display='none'; $('#setupCard').style.display='block'; };

/* ---------- confetti ---------- */
const cv=$('#confetti'), ctx=cv.getContext('2d'); let parts=[], confRAF=null;
function size(){ cv.width=innerWidth; cv.height=innerHeight; } addEventListener('resize',size); size();
function burst(){
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cols=['#b567ff','#964bcc','#ffd86b','#ffffff','#4b0d87','#ff8fd1']; parts=[];
  for(let i=0;i<170;i++) parts.push({ x:innerWidth/2+(Math.random()-.5)*280, y:innerHeight*0.3,
    vx:(Math.random()-.5)*9, vy:Math.random()*-11-4, s:5+Math.random()*7, c:cols[i%cols.length],
    r:Math.random()*6, vr:(Math.random()-.5)*.4, life:1 });
  if(confRAF) cancelAnimationFrame(confRAF); loop();
}
function loop(){
  ctx.clearRect(0,0,cv.width,cv.height); let alive=false;
  for(const p of parts){ p.vy+=0.28; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life-=0.008;
    if(p.life>0 && p.y<cv.height+40){ alive=true; ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore(); } }
  if(alive) confRAF=requestAnimationFrame(loop); else ctx.clearRect(0,0,cv.width,cv.height);
}

buildCharGrid(); render();
</script>
</body>
